{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — IMJUVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F4F4F4] font-sans min-h-screen">

    <nav class="bg-[#6A1B29] text-white px-6 py-3 flex justify-between items-center shadow-md">
        <a href="{% url 'landing' %}" class="font-bold tracking-wider text-sm md:text-base">Gobierno de México · IMJUVE</a>
        <a href="{% url 'accounts:registro' %}" class="text-sm border border-white/70 hover:bg-white/10 py-1.5 px-4 rounded font-semibold">Registrarse</a>
    </nav>

    <main class="max-w-md mx-auto my-16 px-4">
        <div class="bg-white rounded-xl shadow-md border border-gray-100 p-6 md:p-8">
            <h1 class="text-[#6A1B29] text-2xl font-bold mb-6 flex items-center">
                <span class="inline-block w-2 h-7 bg-[#BC955C] mr-2 rounded"></span>
                Iniciar Sesión
            </h1>

            {% if form.non_field_errors %}
            <div class="mb-4 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm p-3">
                {{ form.non_field_errors|striptags }}
            </div>
            {% endif %}

            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1" for="id_username">Correo electrónico</label>
                    <input type="email" name="username" id="id_username" required autofocus value="{{ form.username.value|default:'' }}"
                           class="w-full border-2 border-gray-200 rounded-lg py-2.5 px-3 text-sm focus:border-[#BC955C] focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1" for="id_password">Contraseña</label>
                    <input type="password" name="password" id="id_password" required
                           class="w-full border-2 border-gray-200 rounded-lg py-2.5 px-3 text-sm focus:border-[#BC955C] focus:outline-none">
                </div>
                <input type="hidden" name="next" value="{{ next }}">
                <button type="submit"
                        class="w-full bg-[#6A1B29] hover:bg-[#561622] text-white font-bold py-3 rounded-lg transition shadow">
                    Entrar
                </button>
                <p class="text-center text-sm text-gray-500">
                    ¿No tienes cuenta?
                    <a href="{% url 'accounts:registro' %}" class="text-[#6A1B29] font-semibold hover:underline">Regístrate</a>
                </p>
            </form>
        </div>
    </main>
</body>
</html>
